version: '3.8'

services:
  microquery:
    build: .
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=${DB_HOST:-localhost}
      - DB_NAME=${DB_NAME:-mydatabase}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASS:-postgres}
      - DB_PORT=${DB_PORT:-5432}
    volumes:
      - ./query_cache.db:/app/query_cache.db
    restart: always

# Note: This assumes Postgres and Ollama are running on the host or in their own containers.
# To link them, you would add more services here.
